server {
    # Nginx listens on port 80
    listen 80;

    # The root folder where our built files live
    # This matches where we copied them in the Dockerfile
    root /usr/share/nginx/html;

    # Default file to serve
    index index.html;

    # This is the most important rule for React apps
    # React is a Single Page Application (SPA) — there's
    # only ONE html file (index.html). When a user refreshes
    # the page on any route, Nginx needs to serve index.html
    # and let React handle the routing.
    # Without this, refreshing would give a 404 error.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    # Files with these extensions get a 1 year cache header
    # The browser won't re-download them unless they change
    # Vite adds a hash to filenames (e.g. main.a1b2c3.js)
    # so cache busting happens automatically
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    # Prevents clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN";
    # Prevents MIME type sniffing
    add_header X-Content-Type-Options "nosniff";

    # Compression
    # Gzip compresses responses before sending to browser
    # Makes the app load faster over the network
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml text/javascript;
}